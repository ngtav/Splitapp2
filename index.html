<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SplitEat — Dividí la cuenta</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #0a0a0f; --surface: #13131a; --surface2: #1a1a24;
  --border: #2c2c3e; --border2: #3a3a52;
  --accent: #b8f050; --accent2: #50c8f0;
  --meat: #f09050; --veg: #50f0a0; --alc: #b050f0;
  --red: #f05050; --red-dim: rgba(240,80,80,0.12);
  --text: #e8e8f0; --muted: #6868a0; --muted2: #9090b8;
  --r: 14px; --r-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; max-width: 480px; margin: 0 auto; overflow-x: hidden; }
body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:9999; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); }
::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
.view { display:none; min-height:100vh; padding-bottom:80px; }
.view.active { display:block; animation:fadeUp .25s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
.top-bar { padding:20px 18px 14px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg); z-index:100; backdrop-filter:blur(12px); }
.back-btn { width:34px; height:34px; border-radius:var(--r-sm); border:1px solid var(--border2); background:var(--surface); color:var(--text); cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.back-btn:active { opacity:.6; }
.top-bar-title { font-family:'Syne',sans-serif; font-size:17px; font-weight:700; flex:1; }
.home-header { padding:28px 18px 20px; background:linear-gradient(160deg,#13131a 0%,#0a0a0f 100%); }
.home-logo { font-family:'Syne',sans-serif; font-size:30px; font-weight:800; letter-spacing:-1.5px; }
.home-logo span { color:var(--accent); }
.home-sub { font-size:13px; color:var(--muted2); margin-top:4px; }
.home-stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:16px 18px 0; }
.stat-chip { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:14px; }
.stat-n { font-family:'Syne',sans-serif; font-size:26px; font-weight:800; color:var(--accent); }
.stat-label { font-size:11px; color:var(--muted2); margin-top:2px; text-transform:uppercase; letter-spacing:.06em; }
.section-label { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); padding:18px 18px 8px; }
.new-event-btn { margin:0 18px 12px; display:flex; align-items:center; gap:10px; background:var(--accent); color:#0a0a0f; border:none; border-radius:var(--r); padding:14px 16px; cursor:pointer; width:calc(100% - 36px); font-family:'Syne',sans-serif; font-size:14px; font-weight:700; transition:all .15s; }
.new-event-btn:active { opacity:.8; transform:scale(.98); }
.new-event-btn .plus { font-size:20px; width:28px; height:28px; background:rgba(0,0,0,.15); border-radius:8px; display:flex; align-items:center; justify-content:center; }
.events-list { padding:0 18px; display:flex; flex-direction:column; gap:10px; }
.event-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; animation:fadeUp .2s ease; }
.event-card-top { padding:14px 14px 10px; display:flex; align-items:flex-start; justify-content:space-between; }
.event-card-name { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; }
.event-card-date { font-size:11px; color:var(--muted2); margin-top:3px; }
.event-card-amount { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; color:var(--accent); text-align:right; }
.event-card-amount-label { font-size:10px; color:var(--muted); text-align:right; margin-top:1px; }
.event-card-footer { padding:8px 14px 10px; display:flex; align-items:center; gap:8px; border-top:1px solid var(--border); }
.badge { font-size:10px; font-weight:600; padding:3px 8px; border-radius:20px; background:var(--surface2); color:var(--muted2); font-family:'Syne',sans-serif; }
.event-card-actions { margin-left:auto; display:flex; gap:6px; }
.icon-btn { width:30px; height:30px; border-radius:var(--r-sm); border:1px solid var(--border2); background:var(--surface2); color:var(--muted2); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; transition:all .15s; }
.icon-btn:active { opacity:.6; }
.icon-btn.danger:active { background:var(--red-dim); color:var(--red); border-color:var(--red); }
.tab-bar { display:flex; gap:4px; padding:10px 18px; border-bottom:1px solid var(--border); background:var(--bg); position:sticky; top:57px; z-index:99; }
.tab-btn { flex:1; padding:9px 4px; border:none; border-radius:var(--r-sm); background:transparent; color:var(--muted); cursor:pointer; font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:.04em; transition:all .2s; text-align:center; }
.tab-btn.active { background:var(--accent); color:#0a0a0f; }
.tab-pane { display:none; padding:14px 18px; }
.tab-pane.active { display:block; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:14px; margin-bottom:12px; }
.card-label { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:12px; }
.field { margin-bottom:10px; }
.field label { font-size:12px; color:var(--muted2); display:block; margin-bottom:4px; }
.field input,.field select,.field textarea { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-sm); padding:10px 12px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:border-color .2s; -webkit-appearance:none; }
.field input:focus,.field select:focus { border-color:var(--accent); }
.field input::placeholder { color:var(--muted); }
select option { background:#1a1a24; }
.row2 { display:flex; gap:8px; } .row2>* { flex:1; }
.btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:12px 16px; border-radius:var(--r-sm); border:none; cursor:pointer; font-family:'Syne',sans-serif; font-size:12px; font-weight:700; letter-spacing:.05em; transition:all .15s; text-align:center; }
.btn:active { opacity:.75; transform:scale(.97); }
.btn-primary { background:var(--accent); color:#0a0a0f; width:100%; }
.btn-ghost { background:var(--surface2); color:var(--text); border:1px solid var(--border2); width:100%; }
.btn-danger { background:var(--red-dim); color:var(--red); border:1px solid var(--red); }
.btn-whatsapp { background:#25d366; color:#fff; width:100%; font-size:13px; }
.btn-sm { padding:7px 12px; font-size:11px; }
.friend-item { background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-sm); padding:10px 12px; display:flex; align-items:center; gap:10px; margin-bottom:8px; animation:fadeUp .2s ease; }
.avatar { width:36px; height:36px; border-radius:9px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-size:13px; font-weight:800; }
.friend-info { flex:1; min-width:0; }
.friend-name { font-size:14px; font-weight:500; }
.tags { display:flex; gap:4px; flex-wrap:wrap; margin-top:3px; }
.tag { font-size:9px; font-weight:700; padding:2px 6px; border-radius:4px; text-transform:uppercase; letter-spacing:.06em; }
.tag-veg { background:rgba(80,240,160,.12); color:var(--veg); }
.tag-meat { background:rgba(240,144,80,.12); color:var(--meat); }
.tag-alc { background:rgba(176,80,240,.12); color:var(--alc); }
.tag-noalc { background:rgba(104,104,160,.15); color:var(--muted2); }
.tag-alias { background:rgba(80,200,240,.10); color:var(--accent2); border:1px solid rgba(80,200,240,.25); font-size:10px; padding:2px 8px; border-radius:4px; font-family:'DM Sans',sans-serif; font-weight:500; letter-spacing:0; text-transform:none; }
.expense-item { background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-sm); padding:12px 12px 10px; margin-bottom:8px; animation:fadeUp .2s ease; }
.expense-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
.expense-desc { font-size:14px; font-weight:500; }
.expense-meta { font-size:11px; color:var(--muted2); margin-top:3px; }
.expense-paid { font-size:11px; color:var(--accent2); margin-top:2px; }
.expense-amount { font-family:'Syne',sans-serif; font-size:17px; font-weight:800; color:var(--accent); white-space:nowrap; }
.expense-actions { display:flex; gap:5px; margin-top:8px; justify-content:flex-end; }
.payer-row { display:flex; align-items:center; justify-content:space-between; padding:8px 10px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-sm); margin-bottom:6px; }
.payer-row label { font-size:13px; display:flex; align-items:center; gap:8px; cursor:pointer; flex:1; }
.payer-row input[type=checkbox] { width:16px; height:16px; accent-color:var(--accent); cursor:pointer; flex-shrink:0; }
.payer-row input[type=number] { width:90px; background:var(--bg); border:1px solid var(--border); border-radius:var(--r-sm); padding:6px 8px; color:var(--text); font-size:13px; font-family:'DM Sans',sans-serif; outline:none; flex-shrink:0; }
.payer-row input[type=number]:focus { border-color:var(--accent); }
.payer-row input[type=number]:disabled { opacity:.3; }
.result-person { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:14px; margin-bottom:10px; }
.rp-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.rp-name { font-size:15px; font-weight:500; flex:1; }
.rp-rows { border-top:1px solid var(--border); padding-top:8px; }
.rp-row { display:flex; justify-content:space-between; font-size:12px; color:var(--muted2); padding:3px 0; }
.rp-total { display:flex; justify-content:space-between; align-items:center; margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }
.rp-label { font-size:12px; }
.rp-amount { font-family:'Syne',sans-serif; font-size:19px; font-weight:800; }
.positive { color:var(--veg); } .negative { color:var(--red); } .zero { color:var(--muted2); }
.transfer-row { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); padding:12px 14px; margin-bottom:8px; display:flex; align-items:center; gap:10px; }
.transfer-txt { flex:1; font-size:13px; }
.transfer-amt { font-family:'Syne',sans-serif; font-size:15px; font-weight:800; color:var(--accent); white-space:nowrap; }
.summary-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:14px; margin-bottom:12px; }
.summary-row { display:flex; justify-content:space-between; align-items:center; padding:5px 0; font-size:13px; }
.summary-row .val { font-family:'Syne',sans-serif; font-weight:700; }
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:500; align-items:flex-end; justify-content:center; backdrop-filter:blur(6px); }
.modal-bg.open { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border2); border-radius:20px 20px 0 0; padding:20px 18px 36px; width:100%; max-width:480px; max-height:90vh; overflow-y:auto; animation:slideUp .25s ease; }
@keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:none;opacity:1} }
.modal-handle { width:36px; height:4px; background:var(--border2); border-radius:2px; margin:0 auto 16px; }
.modal-title { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; margin-bottom:16px; }
.modal-actions { display:flex; gap:8px; margin-top:14px; }
.modal-actions .btn { flex:1; }
.empty { text-align:center; padding:36px 20px; color:var(--muted2); }
.empty-icon { font-size:34px; margin-bottom:8px; }
.empty-text { font-size:14px; line-height:1.5; }
.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--accent); color:#0a0a0f; padding:10px 20px; border-radius:20px; font-family:'Syne',sans-serif; font-size:13px; font-weight:700; z-index:9000; opacity:0; pointer-events:none; white-space:nowrap; transition:all .3s; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:rgba(10,10,15,.95); border-top:1px solid var(--border); display:flex; padding:8px 0 16px; backdrop-filter:blur(16px); z-index:200; }
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:8px 0; border:none; background:none; color:var(--muted); cursor:pointer; transition:color .2s; font-size:10px; font-family:'Syne',sans-serif; font-weight:600; letter-spacing:.04em; }
.nav-btn.active { color:var(--accent); }
.nav-icon { font-size:20px; }
</style>
</head>
<body>

<!-- ══ HOME ══ -->
<div class="view active" id="view-home">
  <div class="home-header">
    <div class="home-logo">Split<span>Eat</span> <span style="font-size:22px">🍽️</span></div>
    <div class="home-sub">Dividí la cuenta entre amigos</div>
  </div>
  <div class="home-stats">
    <div class="stat-chip"><div class="stat-n" id="stat-events">0</div><div class="stat-label">Eventos</div></div>
    <div class="stat-chip"><div class="stat-n" id="stat-total">$0</div><div class="stat-label">Total gastado</div></div>
  </div>
  <div class="section-label">Mis eventos</div>
  <button class="new-event-btn" onclick="openNewEventModal()"><div class="plus">+</div> Crear nuevo evento</button>
  <div class="events-list" id="events-list">
    <div class="empty"><div class="empty-icon">📅</div><div class="empty-text">Todavía no tenés eventos.<br>Creá uno para empezar.</div></div>
  </div>
</div>

<!-- ══ EVENT ══ -->
<div class="view" id="view-event">
  <div class="top-bar">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="top-bar-title" id="ev-title">Evento</div>
    <button onclick="openShareModal()" style="font-size:20px;background:none;border:none;color:var(--accent2);cursor:pointer;padding:4px">📤</button>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchInnerTab('amigos',this)">👥 Amigos</button>
    <button class="tab-btn" onclick="switchInnerTab('gastos',this)">🧾 Gastos</button>
    <button class="tab-btn" onclick="switchInnerTab('resultado',this)">💰 Resultado</button>
  </div>

  <div class="tab-pane active" id="pane-amigos">
    <div class="card">
      <div class="card-label">Agregar amigo</div>
      <div class="row2">
        <div class="field"><label>Nombre</label><input type="text" id="f-name" placeholder="Ej: Martina" maxlength="22"></div>
        <div class="field"><label>Alias CVU <span style="color:var(--muted);font-weight:400">(opcional)</span></label><input type="text" id="f-alias" placeholder="mi.alias" maxlength="40"></div>
      </div>
      <div class="row2">
        <div class="field"><label>Dieta</label><select id="f-diet"><option value="meat">🥩 Come carne</option><option value="veg">🥗 Vegetariano/a</option><option value="none">🚫 No come</option></select></div>
        <div class="field"><label>Alcohol</label><select id="f-alc"><option value="yes">🍺 Toma</option><option value="no">🧃 No toma</option></select></div>
      </div>
      <button class="btn btn-primary" onclick="addFriend()">+ Agregar</button>
    </div>
    <div id="friends-list-inner"></div>
  </div>

  <div class="tab-pane" id="pane-gastos">
    <div class="card">
      <div class="card-label" id="exp-form-label">Registrar gasto</div>
      <div class="field"><label>Descripción</label><input type="text" id="e-desc" placeholder="Ej: Pizza, Vino, Asado…" maxlength="50"></div>
      <div class="row2">
        <div class="field"><label>Monto ($)</label><input type="number" id="e-amt" placeholder="0.00" min="0" step="0.01" oninput="updateRemaining()"></div>
        <div class="field"><label>Tipo</label>
          <select id="e-type" onchange="togglePayerSection()">
            <option value="food-all">🍽️ Comida (todos los que comen)</option>
            <option value="food-meat">🥩 Solo carnívoros</option>
            <option value="food-veg">🥗 Solo veggie</option>
            <option value="alcohol">🍺 Solo alcohol (incluso no comen)</option>
            <option value="no-alcohol">🧃 Sin alcohol</option>
            <option value="all">👥 Gasto general (todos sin excepción)</option>
            <option value="tip">🤝 Propina / Bono</option>
          </select>
        </div>
      </div>
      <div class="field" id="payer-field-wrapper">
        <label>¿Quién pagó?</label>
        <div id="payer-list-form" style="margin-top:4px"></div>
        <div id="payer-remaining" style="display:none;margin-top:8px;padding:8px 12px;border-radius:var(--r-sm);font-size:12px;font-family:'Syne',sans-serif;font-weight:700;text-align:center;transition:all .2s"></div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" id="cancel-edit-btn" style="display:none;flex:1" onclick="cancelEdit()">Cancelar</button>
        <button class="btn btn-primary" id="save-exp-btn" onclick="saveExpense()">+ Guardar gasto</button>
      </div>
    </div>
    <div id="expense-list-inner"></div>
  </div>

  <div class="tab-pane" id="pane-resultado">
    <div id="result-inner"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
      <button class="btn btn-whatsapp" onclick="openShareModal()"><span style="font-size:15px">💬</span> WhatsApp</button>
      <button class="btn" style="background:var(--accent2);color:#0a0a0f" onclick="openExportModal()"><span style="font-size:15px">📊</span> Exportar</button>
    </div>
    <canvas id="matrix-canvas" style="display:none"></canvas>
  </div>
</div>

<!-- ══ MODAL: EXPORT ══ -->
<div class="modal-bg" id="modal-export" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">📊 Exportar resultado</div>
    <p style="font-size:13px;color:var(--muted2);margin-bottom:16px;line-height:1.5">Elegí el formato para exportar la matriz de pagos.</p>
    <button class="btn" style="background:var(--surface2);border:1px solid var(--border2);color:var(--text);width:100%;margin-bottom:10px;justify-content:flex-start;gap:12px;padding:14px 16px" onclick="exportExcel()">
      <span style="font-size:22px">📗</span>
      <div style="text-align:left"><div style="font-size:13px;font-weight:700">Exportar a Excel (.xlsx)</div><div style="font-size:11px;color:var(--muted2);margin-top:2px">Matriz + detalle por persona + gastos</div></div>
    </button>
    <button class="btn" style="background:var(--surface2);border:1px solid var(--border2);color:var(--text);width:100%;justify-content:flex-start;gap:12px;padding:14px 16px" onclick="exportMatrixImage()">
      <span style="font-size:22px">🖼️</span>
      <div style="text-align:left"><div style="font-size:13px;font-weight:700">Exportar como imagen</div><div style="font-size:11px;color:var(--muted2);margin-top:2px">Matriz visual lista para compartir</div></div>
    </button>
    <div id="matrix-preview" style="margin-top:14px"></div>
  </div>
</div>

<!-- ══ MODAL: NEW/EDIT EVENT ══ -->
<div class="modal-bg" id="modal-event" onclick="closeEventModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-event-title">Nuevo evento</div>
    <div class="field"><label>Nombre del evento</label><input type="text" id="ev-name-inp" placeholder="Ej: Cumpleaños de Leo…" maxlength="40"></div>
    <div class="field"><label>Fecha</label><input type="date" id="ev-date-inp"></div>
    <div class="field"><label>Descripción (opcional)</label><input type="text" id="ev-desc-inp" placeholder="Ej: Casa de Marta…" maxlength="60"></div>
    <input type="hidden" id="ev-editing-id">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeEventModalDirect()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEvent()">Guardar</button>
    </div>
  </div>
</div>

<!-- ══ MODAL: SHARE ══ -->
<div class="modal-bg" id="modal-share" onclick="closeShareModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Compartir resultado</div>
    <div class="field">
      <textarea id="share-text" rows="8" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;resize:none;outline:none;line-height:1.6"></textarea>
    </div>
    <button class="btn btn-whatsapp" onclick="shareWhatsApp()"><span style="font-size:16px">💬</span> Abrir en WhatsApp</button>
    <button class="btn btn-ghost" style="margin-top:8px" onclick="copyToClipboard()">📋 Copiar texto</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ══ MODAL: EDIT FRIEND ══ -->
<div class="modal-bg" id="modal-edit-friend" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">✎ Editar amigo</div>
    <input type="hidden" id="ef-id">
    <div class="row2">
      <div class="field"><label>Nombre</label><input type="text" id="ef-name" maxlength="22"></div>
      <div class="field"><label>Alias CVU <span style="color:var(--muted);font-weight:400">(opcional)</span></label><input type="text" id="ef-alias" placeholder="mi.alias" maxlength="40"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Dieta</label><select id="ef-diet"><option value="meat">🥩 Come carne</option><option value="veg">🥗 Vegetariano/a</option><option value="none">🚫 No come</option></select></div>
      <div class="field"><label>Alcohol</label><select id="ef-alc"><option value="yes">🍺 Toma</option><option value="no">🧃 No toma</option></select></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="document.getElementById('modal-edit-friend').classList.remove('open')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEditFriend()">Guardar</button>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="goHome()"><span class="nav-icon">🏠</span>Inicio</button>
  <button class="nav-btn" onclick="if(currentEventId)switchInnerTab('amigos',null)"><span class="nav-icon">👥</span>Amigos</button>
  <button class="nav-btn" onclick="if(currentEventId)switchInnerTab('gastos',null)"><span class="nav-icon">🧾</span>Gastos</button>
  <button class="nav-btn" onclick="if(currentEventId)switchInnerTab('resultado',null)"><span class="nav-icon">💰</span>Resultado</button>
</div>

<script>
// ════════════════════════════════
// STATE & STORAGE
// ════════════════════════════════
let db = { events: [], nextEventId: 1 };
let currentEventId = null;
let editingExpenseId = null;
const COLORS = ['#b8f050','#50c8f0','#f09050','#50f0a0','#b050f0','#f05098','#f0d050','#5080f0'];
const TYPE_LABEL = {'all':'Gasto general (todos)','food-all':'Comida (todos los que comen)','food-meat':'Solo carnívoros','food-veg':'Solo veggie','alcohol':'Solo alcohol','no-alcohol':'Sin alcohol','tip':'Propina / Bono'};

function save() { try { localStorage.setItem('spliteat_v3', JSON.stringify(db)); } catch(e){} }
function load() { try { const s=localStorage.getItem('spliteat_v3'); if(s) db=JSON.parse(s); } catch(e){} }
function getEvent(id) { return db.events.find(e=>e.id===id); }
function getColor(i) { return COLORS[i%COLORS.length]; }
function initials(n) { return n.slice(0,2).toUpperCase(); }

// ════════════════════════════════
// VIEWS
// ════════════════════════════════
function showView(id) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',id==='view-home'&&i===0));
}
function goHome() {
  currentEventId=null; editingExpenseId=null;
  showView('view-home'); renderHome();
}

// ════════════════════════════════
// HOME
// ════════════════════════════════
function renderHome() {
  const total=db.events.reduce((s,e)=>s+(e.expenses||[]).reduce((ss,ex)=>ss+ex.amount,0),0);
  document.getElementById('stat-events').textContent=db.events.length;
  document.getElementById('stat-total').textContent='$'+total.toFixed(0);
  const el=document.getElementById('events-list');
  if(!db.events.length){ el.innerHTML='<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">Todavía no tenés eventos.<br>Creá uno para empezar.</div></div>'; return; }
  el.innerHTML=db.events.slice().reverse().map(ev=>{
    const tot=(ev.expenses||[]).reduce((s,e)=>s+e.amount,0);
    return `<div class="event-card">
      <div class="event-card-top" onclick="openEvent(${ev.id})" style="cursor:pointer">
        <div>
          <div class="event-card-name">${ev.name}</div>
          <div class="event-card-date">${formatDate(ev.date)}${ev.description?' · '+ev.description:''}</div>
        </div>
        <div><div class="event-card-amount">$${tot.toFixed(0)}</div><div class="event-card-amount-label">total</div></div>
      </div>
      <div class="event-card-footer">
        <span class="badge">👥 ${(ev.friends||[]).length}</span>
        <span class="badge">🧾 ${(ev.expenses||[]).length}</span>
        <div class="event-card-actions">
          <button class="icon-btn" title="Clonar" onclick="cloneEvent(${ev.id},event)">⧉</button>
          <button class="icon-btn" title="Editar" onclick="editEventModal(${ev.id},event)">✎</button>
          <button class="icon-btn danger" title="Eliminar" onclick="deleteEvent(${ev.id},event)">✕</button>
        </div>
      </div>
    </div>`;
  }).join('');
}
function formatDate(d) { if(!d) return ''; const [y,m,day]=d.split('-'); return `${day}/${m}/${y}`; }

// ════════════════════════════════
// EVENT MODAL
// ════════════════════════════════
function openNewEventModal() {
  document.getElementById('modal-event-title').textContent='Nuevo evento';
  ['ev-name-inp','ev-desc-inp'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('ev-date-inp').value=new Date().toISOString().slice(0,10);
  document.getElementById('ev-editing-id').value='';
  document.getElementById('modal-event').classList.add('open');
  setTimeout(()=>document.getElementById('ev-name-inp').focus(),200);
}
function editEventModal(id,e) {
  e.stopPropagation();
  const ev=getEvent(id);
  document.getElementById('modal-event-title').textContent='Editar evento';
  document.getElementById('ev-name-inp').value=ev.name;
  document.getElementById('ev-date-inp').value=ev.date||'';
  document.getElementById('ev-desc-inp').value=ev.description||'';
  document.getElementById('ev-editing-id').value=id;
  document.getElementById('modal-event').classList.add('open');
}
function saveEvent() {
  const name=document.getElementById('ev-name-inp').value.trim();
  if(!name){ showToast('Ingresá un nombre'); return; }
  const date=document.getElementById('ev-date-inp').value;
  const desc=document.getElementById('ev-desc-inp').value.trim();
  const eid=document.getElementById('ev-editing-id').value;
  if(eid){ const ev=getEvent(parseInt(eid)); ev.name=name; ev.date=date; ev.description=desc; }
  else db.events.push({id:db.nextEventId++,name,date,description:desc,friends:[],expenses:[],nextFriendId:1,nextExpenseId:1});
  save(); closeEventModalDirect(); renderHome();
  showToast(eid?'✓ Evento actualizado':'✓ Evento creado');
}
function deleteEvent(id,e) {
  e.stopPropagation();
  if(!confirm('¿Eliminar este evento?')) return;
  db.events=db.events.filter(ev=>ev.id!==id);
  save(); renderHome(); showToast('Evento eliminado');
}
function cloneEvent(id,e) {
  e.stopPropagation();
  const src=getEvent(id);
  const nev=JSON.parse(JSON.stringify(src));
  nev.id=db.nextEventId++; nev.name=src.name+' (copia)';
  nev.date=new Date().toISOString().slice(0,10);
  nev.expenses=[]; nev.nextExpenseId=1;
  db.events.push(nev); save(); renderHome(); showToast('✓ Evento clonado (sin gastos)');
}
function closeEventModal(e){ if(e.target===document.getElementById('modal-event')) closeEventModalDirect(); }
function closeEventModalDirect(){ document.getElementById('modal-event').classList.remove('open'); }

// ════════════════════════════════
// OPEN EVENT / TABS
// ════════════════════════════════
function openEvent(id) {
  currentEventId=id;
  document.getElementById('ev-title').textContent=getEvent(id).name;
  showView('view-event'); switchInnerTab('amigos',null);
}
function switchInnerTab(name,btn) {
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pane-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
  else {
    const idx=['amigos','gastos','resultado'].indexOf(name);
    document.querySelectorAll('.tab-btn')[idx]?.classList.add('active');
    document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===idx+1));
  }
  if(name==='amigos') renderFriends();
  if(name==='gastos'){ renderPayerForm(); renderExpenses(); togglePayerSection(); }
  if(name==='resultado') renderResult();
}

// ════════════════════════════════
// FRIENDS
// ════════════════════════════════
function addFriend() {
  const name=document.getElementById('f-name').value.trim();
  if(!name){ showToast('Ingresá un nombre'); return; }
  const ev=getEvent(currentEventId);
  const alias=document.getElementById('f-alias').value.trim();
  ev.friends.push({id:ev.nextFriendId++,name,alias,diet:document.getElementById('f-diet').value,alcohol:document.getElementById('f-alc').value});
  document.getElementById('f-name').value=''; document.getElementById('f-alias').value='';
  save(); renderFriends(); showToast('✓ '+name+' agregado/a');
}
function editFriend(id) {
  const ev=getEvent(currentEventId), f=ev.friends.find(fr=>fr.id===id);
  document.getElementById('ef-id').value=id;
  document.getElementById('ef-name').value=f.name;
  document.getElementById('ef-alias').value=f.alias||'';
  document.getElementById('ef-diet').value=f.diet;
  document.getElementById('ef-alc').value=f.alcohol;
  document.getElementById('modal-edit-friend').classList.add('open');
  setTimeout(()=>document.getElementById('ef-name').focus(),200);
}
function saveEditFriend() {
  const ev=getEvent(currentEventId);
  const id=parseInt(document.getElementById('ef-id').value);
  const f=ev.friends.find(fr=>fr.id===id);
  const name=document.getElementById('ef-name').value.trim();
  if(!name){ showToast('Ingresá un nombre'); return; }
  f.name=name;
  f.alias=document.getElementById('ef-alias').value.trim();
  f.diet=document.getElementById('ef-diet').value;
  f.alcohol=document.getElementById('ef-alc').value;
  // update payer names in existing expenses
  ev.expenses.forEach(e=>{ const p=e.payers.find(p=>p.friendId===id); if(p) p.name=name; });
  save(); renderFriends(); renderPayerForm();
  document.getElementById('modal-edit-friend').classList.remove('open');
  showToast('✓ '+name+' actualizado/a');
}
function removeFriend(id) {
  const ev=getEvent(currentEventId);
  ev.friends=ev.friends.filter(f=>f.id!==id);
  save(); renderFriends(); renderPayerForm();
}
function renderFriends() {
  const ev=getEvent(currentEventId), el=document.getElementById('friends-list-inner');
  if(!ev.friends.length){ el.innerHTML='<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">Agregá amigos arriba.</div></div>'; return; }
  el.innerHTML=ev.friends.map((f,i)=>`
    <div class="friend-item">
      <div class="avatar" style="background:${getColor(i)}22;color:${getColor(i)}">${initials(f.name)}</div>
      <div class="friend-info">
        <div class="friend-name">${f.name}</div>
        <div class="tags">
          ${f.diet==='veg'?'<span class="tag tag-veg">🥗 Veggie</span>':f.diet==='none'?'<span class="tag tag-noalc">🚫 No come</span>':'<span class="tag tag-meat">🥩 Carne</span>'}
          ${f.alcohol==='yes'?'<span class="tag tag-alc">🍺 Alcohol</span>':'<span class="tag tag-noalc">🧃 Sin alcohol</span>'}
          ${f.alias?`<span class="tag tag-alias">💳 ${f.alias}</span>`:''}
        </div>
      </div>
      <div style="display:flex;gap:5px">
        <button class="icon-btn" onclick="editFriend(${f.id})" style="font-size:12px">✎</button>
        <button class="icon-btn danger" onclick="removeFriend(${f.id})">✕</button>
      </div>
    </div>`).join('');
}

// ════════════════════════════════
// PAYER FORM
// ════════════════════════════════
function renderPayerForm(editData) {
  const ev=getEvent(currentEventId), el=document.getElementById('payer-list-form');
  if(!ev.friends.length){ el.innerHTML='<div style="font-size:12px;color:var(--muted2);padding:6px 0">Agregá amigos primero.</div>'; return; }
  el.innerHTML=ev.friends.map(f=>{
    const p=editData?.payers?.find(p=>p.friendId===f.id);
    return `<div class="payer-row">
      <label><input type="checkbox" id="pc-${f.id}" onchange="togglePayer(${f.id})" ${p?'checked':''}> ${f.name}</label>
      <input type="number" id="pa-${f.id}" placeholder="$0" min="0" step="0.01" ${p?'':'disabled'} value="${p?p.paid:''}" oninput="updateRemaining()">
    </div>`;
  }).join('');
}
function togglePayer(id) {
  const cb=document.getElementById('pc-'+id), inp=document.getElementById('pa-'+id);
  inp.disabled=!cb.checked; if(cb.checked) inp.focus(); else inp.value='';
  updateRemaining();
}
function updateRemaining() {
  const total = parseFloat(document.getElementById('e-amt').value) || 0;
  const el = document.getElementById('payer-remaining');
  if(!el) return;
  if(document.getElementById('e-type').value === 'tip' || total <= 0) { el.style.display='none'; return; }
  const ev = getEvent(currentEventId);
  if(!ev) return;
  let sumPaid = 0;
  ev.friends.forEach(f => {
    const cb = document.getElementById('pc-'+f.id);
    if(cb && cb.checked) sumPaid += parseFloat(document.getElementById('pa-'+f.id).value) || 0;
  });
  const remaining = Math.round((total - sumPaid) * 100) / 100;
  el.style.display = 'block';
  if(Math.abs(remaining) < 0.01) {
    el.style.background = 'rgba(80,240,160,.12)';
    el.style.color = 'var(--veg)';
    el.style.border = '1px solid rgba(80,240,160,.3)';
    el.textContent = '✓ Monto completo';
  } else if(remaining > 0) {
    el.style.background = 'rgba(240,208,80,.1)';
    el.style.color = '#f0d050';
    el.style.border = '1px solid rgba(240,208,80,.3)';
    el.textContent = `Falta asignar: $${remaining.toFixed(2)}`;
  } else {
    el.style.background = 'var(--red-dim)';
    el.style.color = 'var(--red)';
    el.style.border = '1px solid rgba(240,80,80,.3)';
    el.textContent = `Excede por: $${Math.abs(remaining).toFixed(2)}`;
  }
}
function togglePayerSection() {
  document.getElementById('payer-field-wrapper').style.display=
    document.getElementById('e-type').value==='tip'?'none':'';
  updateRemaining();
}

// ════════════════════════════════
// EXPENSES
// ════════════════════════════════
function saveExpense() {
  const ev=getEvent(currentEventId);
  const desc=document.getElementById('e-desc').value.trim();
  const amount=parseFloat(document.getElementById('e-amt').value);
  const type=document.getElementById('e-type').value;
  if(!desc){ showToast('Ingresá una descripción'); return; }
  if(!amount||amount<=0){ showToast('Monto inválido'); return; }
  if(!ev.friends.length){ showToast('Agregá amigos primero'); return; }
  const payers=[];
  ev.friends.forEach(f=>{ const cb=document.getElementById('pc-'+f.id); if(cb&&cb.checked){ const amt=parseFloat(document.getElementById('pa-'+f.id).value)||0; if(amt>0) payers.push({friendId:f.id,name:f.name,paid:amt}); } });
  if(!payers.length&&type!=='tip'){ showToast('Seleccioná quién pagó y cuánto'); return; }
  if(type !== 'tip') {
    const sumPaid = Math.round(payers.reduce((s,p)=>s+p.paid,0)*100)/100;
    const amtRound = Math.round(amount*100)/100;
    if(Math.abs(sumPaid - amtRound) > 0.01) {
      const diff = Math.round((amtRound - sumPaid)*100)/100;
      showToast(diff > 0 ? `Falta asignar $${diff.toFixed(2)}` : `Excede por $${Math.abs(diff).toFixed(2)}`);
      return;
    }
  }
  const applicable=ev.friends.filter(f=>{
    if(type==='all') return true;
    if(type==='tip') return true;
    if(type==='food-all') return f.diet!=='none';     // "no come" excluded from food
    if(type==='food-meat') return f.diet==='meat';
    if(type==='food-veg') return f.diet==='veg';
    if(type==='alcohol') return f.alcohol==='yes';
    if(type==='no-alcohol') return f.alcohol==='no';
    return true;
  }).map(f=>f.id);
  if(!applicable.length){ showToast('Ningún amigo aplica a este tipo'); return; }
  if(editingExpenseId!==null) {
    const exp=ev.expenses.find(e=>e.id===editingExpenseId);
    Object.assign(exp,{desc,amount,type,payers,applicable});
    editingExpenseId=null;
    document.getElementById('exp-form-label').textContent='Registrar gasto';
    document.getElementById('save-exp-btn').textContent='+ Guardar gasto';
    document.getElementById('cancel-edit-btn').style.display='none';
    showToast('✓ Gasto actualizado');
  } else {
    ev.expenses.push({id:ev.nextExpenseId++,desc,amount,type,payers,applicable});
    showToast('✓ Gasto agregado');
  }
  document.getElementById('e-desc').value=''; document.getElementById('e-amt').value='';
  ev.friends.forEach(f=>{ const cb=document.getElementById('pc-'+f.id),inp=document.getElementById('pa-'+f.id); if(cb){cb.checked=false;inp.disabled=true;inp.value='';} });
  save(); renderExpenses();
}
function editExpense(id) {
  const ev=getEvent(currentEventId), exp=ev.expenses.find(e=>e.id===id);
  editingExpenseId=id;
  document.getElementById('e-desc').value=exp.desc;
  document.getElementById('e-amt').value=exp.amount;
  document.getElementById('e-type').value=exp.type;
  togglePayerSection();
  document.getElementById('exp-form-label').textContent='Editar gasto';
  document.getElementById('save-exp-btn').textContent='✓ Actualizar gasto';
  document.getElementById('cancel-edit-btn').style.display='';
  renderPayerForm(exp); window.scrollTo({top:0,behavior:'smooth'});
}
function cancelEdit() {
  editingExpenseId=null;
  document.getElementById('e-desc').value=''; document.getElementById('e-amt').value='';
  document.getElementById('exp-form-label').textContent='Registrar gasto';
  document.getElementById('save-exp-btn').textContent='+ Guardar gasto';
  document.getElementById('cancel-edit-btn').style.display='none';
  document.getElementById('e-type').value='all'; togglePayerSection(); renderPayerForm();
}
function deleteExpense(id) {
  const ev=getEvent(currentEventId);
  ev.expenses=ev.expenses.filter(e=>e.id!==id);
  if(editingExpenseId===id) cancelEdit();
  save(); renderExpenses(); showToast('Gasto eliminado');
}
function renderExpenses() {
  const ev=getEvent(currentEventId), el=document.getElementById('expense-list-inner');
  if(!ev.expenses.length){ el.innerHTML='<div class="empty"><div class="empty-icon">🧾</div><div class="empty-text">Sin gastos todavía.</div></div>'; return; }
  el.innerHTML=ev.expenses.map(e=>`
    <div class="expense-item">
      <div class="expense-top">
        <div>
          <div class="expense-desc">${e.desc}</div>
          <div class="expense-meta">${TYPE_LABEL[e.type]} · ${e.applicable.length} persona${e.applicable.length!==1?'s':''}</div>
          ${e.payers.length?`<div class="expense-paid">💳 ${e.payers.map(p=>`${p.name} $${p.paid.toFixed(2)}`).join(' · ')}</div>`:''}
        </div>
        <div class="expense-amount">$${e.amount.toFixed(2)}</div>
      </div>
      <div class="expense-actions">
        <button class="btn btn-ghost btn-sm" onclick="editExpense(${e.id})">✎ Editar</button>
        <button class="btn btn-danger btn-sm" onclick="deleteExpense(${e.id})">✕</button>
      </div>
    </div>`).join('');
}

// ════════════════════════════════
// RESULT CALCULATION
// ════════════════════════════════
function calcResult(ev) {
  const owes={}, paid={}, rawOwes={};
  (ev.friends||[]).forEach(f=>{ owes[f.id]=0; paid[f.id]=0; rawOwes[f.id]=0; });

  (ev.expenses||[]).forEach(e=>{
    const n = e.applicable.length;
    const exact = e.amount / n;
    const floor = Math.floor(exact);
    const remainder = Math.round((e.amount - floor * n)); // extra pesos to distribute

    // assign floored share to everyone, then add 1 to the first `remainder` people
    e.applicable.forEach((fid, idx)=>{
      const share = floor + (idx < remainder ? 1 : 0);
      rawOwes[fid] = (rawOwes[fid]||0) + share;
    });
    e.payers.forEach(p=>{ paid[p.friendId]=(paid[p.friendId]||0)+p.paid; });
  });

  // round paid too (payers enter exact amounts, but we round for display/transfer)
  (ev.friends||[]).forEach(f=>{ owes[f.id] = rawOwes[f.id]||0; });

  const balance={};
  (ev.friends||[]).forEach(f=>{ balance[f.id] = Math.round((paid[f.id]||0)) - (owes[f.id]||0); });

  // greedy transfers (all integer amounts)
  const cr=(ev.friends||[]).filter(f=>balance[f.id]>0).map(f=>({id:f.id,name:f.name,amount:balance[f.id]}));
  const dr=(ev.friends||[]).filter(f=>balance[f.id]<0).map(f=>({id:f.id,name:f.name,amount:-balance[f.id]}));
  const transfers=[]; let ci=0,di=0;
  while(ci<cr.length&&di<dr.length){
    const t=Math.min(cr[ci].amount,dr[di].amount);
    if(t>0) transfers.push({from:dr[di].name,to:cr[ci].name,amount:t});
    cr[ci].amount-=t; dr[di].amount-=t;
    if(cr[ci].amount<=0)ci++; if(dr[di].amount<=0)di++;
  }
  return {owes,paid,balance,transfers};
}
function renderResult() {
  const ev=getEvent(currentEventId), el=document.getElementById('result-inner');
  if(!ev.friends.length||!ev.expenses.length){ el.innerHTML='<div class="empty"><div class="empty-icon">💰</div><div class="empty-text">Agregá amigos y gastos para ver el resultado.</div></div>'; return; }
  const {owes,paid,balance,transfers}=calcResult(ev);
  const total=Math.round(ev.expenses.reduce((s,e)=>s+e.amount,0));
  let html=`<div class="summary-card">
    <div class="summary-row"><span>Gasto total</span><span class="val" style="color:var(--accent)">$${total}</span></div>
    <div class="summary-row"><span>Gastos registrados</span><span class="val">${ev.expenses.length}</span></div>
    <div class="summary-row"><span>Personas</span><span class="val">${ev.friends.length}</span></div>
  </div>
  <div style="font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:14px 0 8px">Lo que corresponde pagar por perfil</div>`;

  // ── PROFILE BREAKDOWN ──
  const profiles = [
    { label: '🥩🍺 Carne + Alcohol',      filter: f => f.diet==='meat' && f.alcohol==='yes' },
    { label: '🥩🧃 Carne sin alcohol',    filter: f => f.diet==='meat' && f.alcohol==='no'  },
    { label: '🥗🍺 Veggie + Alcohol',     filter: f => f.diet==='veg'  && f.alcohol==='yes' },
    { label: '🥗🧃 Veggie sin alcohol',   filter: f => f.diet==='veg'  && f.alcohol==='no'  },
    { label: '🚫🍺 Solo toma (no come)',  filter: f => f.diet==='none' && f.alcohol==='yes' },
  ];
  html += '<div class="summary-card" style="margin-bottom:12px">';
  profiles.forEach(p => {
    const members = ev.friends.filter(p.filter);
    if(!members.length) return;
    const perPerson = owes[members[0].id] || 0;
    const names = members.map(f=>f.name).join(', ');
    html += `<div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
      <div>
        <div style="font-size:12px;font-weight:600">${p.label}</div>
        <div style="font-size:11px;color:var(--muted2);margin-top:2px">${names}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:10px;color:var(--muted2);margin-bottom:2px">c/u le corresponde pagar</div>
        <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--accent)">$${perPerson}</div>
      </div>
    </div>`;
  });
  html += '</div>';

  html += `<div style="font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px">Por persona</div>`;
  ev.friends.forEach((f,i)=>{
    const b=balance[f.id], cls=b>0?'positive':b<0?'negative':'zero';
    const lbl=b>0?'← Le deben':b<0?'→ Debe pagar':'✓ En cero';
    const aliasRow=(b>0&&f.alias)?`<div class="rp-row" style="margin-top:6px;padding-top:6px;border-top:1px dashed var(--border)"><span style="color:var(--accent2)">💳 Alias</span><span style="color:var(--accent2);font-family:'DM Sans',sans-serif;font-weight:500;font-size:13px">${f.alias}</span></div>`:'';
    html+=`<div class="result-person">
      <div class="rp-header">
        <div class="avatar" style="background:${getColor(i)}22;color:${getColor(i)};width:32px;height:32px;border-radius:8px;font-size:12px">${initials(f.name)}</div>
        <div class="rp-name">${f.name}</div>
      </div>
      <div class="rp-rows">
        <div class="rp-row"><span>Le corresponde pagar</span><span>$${owes[f.id]||0}</span></div>
        <div class="rp-row"><span>Pagó</span><span>$${Math.round(paid[f.id]||0)}</span></div>
        ${aliasRow}
      </div>
      <div class="rp-total"><span class="rp-label ${cls}">${lbl}</span><span class="rp-amount ${cls}">$${Math.abs(b)}</span></div>
    </div>`;
  });
  if(transfers.length){
    html+=`<div style="font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:14px 0 8px">Transferencias</div>`;
    transfers.forEach(t=>{
      const rec=ev.friends.find(f=>f.name===t.to);
      const aliasHtml=rec?.alias?`<div style="font-size:11px;color:var(--accent2);margin-top:4px">💳 ${rec.alias}</div>`:'';
      html+=`<div class="transfer-row"><span style="font-size:18px">💸</span><div class="transfer-txt"><div><strong>${t.from}</strong> → <strong>${t.to}</strong></div>${aliasHtml}</div><div class="transfer-amt">$${t.amount}</div></div>`;
    });
  }
  el.innerHTML=html;
}

// SHARE (WhatsApp)
// ════════════════════════════════
function buildShareText() {
  const ev=getEvent(currentEventId), {owes,paid,balance,transfers}=calcResult(ev);
  const total=ev.expenses.reduce((s,e)=>s+e.amount,0);
  let txt=`🍽️ *SplitEat — ${ev.name}*\n`;
  if(ev.date) txt+=`📅 ${formatDate(ev.date)}\n`;
  txt+=`\n💰 *Total gastado: $${total.toFixed(2)}*\n\n👤 *Por persona:*\n`;
  ev.friends.forEach(f=>{ const b=balance[f.id]; txt+=`${b>0?'🟢':b<0?'🔴':'✅'} ${f.name}: ${b>0?`le deben $${b}`:b<0?`debe pagar $${Math.abs(b)}`:'en cero'}\n`; });
  if(transfers.length){
    txt+='\n💸 *Transferencias:*\n';
    transfers.forEach(t=>{ const rec=ev.friends.find(f=>f.name===t.to); txt+=`→ ${t.from} le paga $${t.amount} a ${t.to}${rec?.alias?'\n   💳 Alias: *'+rec.alias+'*':''}\n`; });
  }
  return txt+'\n_Generado con SplitEat_ 🍽️';
}
function openShareModal() {
  const ev=getEvent(currentEventId);
  if(!ev||!ev.friends.length||!ev.expenses.length){ showToast('Agregá amigos y gastos primero'); return; }
  document.getElementById('share-text').value=buildShareText();
  document.getElementById('modal-share').classList.add('open');
}
function shareWhatsApp() { window.open('https://wa.me/?text='+encodeURIComponent(buildShareText()),'_blank'); closeShareModalDirect(); }
function closeShareModal(e){ if(e.target===document.getElementById('modal-share')) closeShareModalDirect(); }
function closeShareModalDirect(){ document.getElementById('modal-share').classList.remove('open'); }
function copyToClipboard() {
  const txt=document.getElementById('share-text').value;
  navigator.clipboard?.writeText(txt).then(()=>showToast('✓ Copiado!')).catch(()=>{ document.getElementById('share-text').select(); document.execCommand('copy'); showToast('✓ Copiado!'); });
}

function openExportModal() {
  const ev=getEvent(currentEventId);
  if(!ev||!ev.friends.length||!ev.expenses.length){ showToast('Agregá amigos y gastos primero'); return; }
  document.getElementById('matrix-preview').innerHTML='';

function exportExcel() {
  const ev=getEvent(currentEventId), {owes,paid,balance,transfers}=calcResult(ev);
  const wb=XLSX.utils.book_new(), friends=ev.friends;
  const total=ev.expenses.reduce((s,e)=>s+e.amount,0);
  const res=[['SplitEat — '+ev.name,'',''],
    [ev.date?'Fecha: '+formatDate(ev.date):'','',''],['','',''],
    ['RESUMEN POR PERSONA','',''],['Nombre','Alias','Corresponde pagar','Pagó','Balance','Estado']];
  friends.forEach(f=>{ const b=balance[f.id]; res.push([f.name,f.alias||'—',owes[f.id]||0,paid[f.id]||0,b,b>0.01?'Le deben':b<-0.01?'Debe pagar':'En cero']); });
  res.push(['','','','','',''],['TOTAL GASTADO','',total,'','',''],['','','','','',''],
    ['TRANSFERENCIAS','','','','',''],['De','A','Monto','Alias receptor','','']);
  transfers.forEach(t=>{ const rec=friends.find(f=>f.name===t.to); res.push([t.from,t.to,t.amount,rec?.alias||'—','','']); });
  const ws1=XLSX.utils.aoa_to_sheet(res); ws1['!cols']=[{wch:20},{wch:22},{wch:18},{wch:12},{wch:12},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws1,'Resumen');
  const mrows=[['Paga ↓ / Recibe →',...friends.map(f=>f.name)]];
  friends.forEach(pr=>{ const row=[pr.name]; friends.forEach(rc=>{ if(pr.id===rc.id){row.push('—');return;} const t=transfers.find(t=>t.from===pr.name&&t.to===rc.name); row.push(t?t.amount:0); }); mrows.push(row); });
  mrows.push([''],['Alias',...friends.map(f=>f.alias||'—')]);
  const ws2=XLSX.utils.aoa_to_sheet(mrows); ws2['!cols']=[{wch:22},...friends.map(()=>({wch:16}))];
  XLSX.utils.book_append_sheet(wb,ws2,'Matriz de pagos');
  const gasto=[['DETALLE','','','',''],['Descripción','Monto','Tipo','Aplica a','Pagado por']];
  ev.expenses.forEach(e=>{ gasto.push([e.desc,e.amount,TYPE_LABEL[e.type],e.applicable.map(id=>friends.find(f=>f.id===id)?.name||'').join(', '),e.payers.map(p=>p.name+' ($'+p.paid.toFixed(2)+')').join(', ')]); });
  gasto.push(['','','','',''],['TOTAL',total,'','','']);
  const ws3=XLSX.utils.aoa_to_sheet(gasto); ws3['!cols']=[{wch:28},{wch:12},{wch:20},{wch:30},{wch:36}];
  XLSX.utils.book_append_sheet(wb,ws3,'Gastos');
  XLSX.writeFile(wb,'SplitEat_'+ev.name.replace(/\s+/g,'_')+'.xlsx');
  showToast('✓ Excel descargado');
}

// EXPORT IMAGE (Canvas)
// ════════════════════════════════
function exportMatrixImage() {
  const ev=getEvent(currentEventId), {owes,paid,balance,transfers}=calcResult(ev);
  const friends=ev.friends, n=friends.length;

  // ── Profile breakdown data ──
  const profiles = [
    { label: 'Carne + Alcohol',    emoji: '🥩🍺', filter: f => f.diet==='meat' && f.alcohol==='yes' },
    { label: 'Carne sin alcohol',  emoji: '🥩🧃', filter: f => f.diet==='meat' && f.alcohol==='no'  },
    { label: 'Veggie + Alcohol',   emoji: '🥗🍺', filter: f => f.diet==='veg'  && f.alcohol==='yes' },
    { label: 'Veggie sin alcohol', emoji: '🥗🧃', filter: f => f.diet==='veg'  && f.alcohol==='no'  },
    { label: 'Solo toma (no come)',emoji: '🚫🍺', filter: f => f.diet==='none' && f.alcohol==='yes' },
  ].filter(p => ev.friends.some(p.filter));
  const PH = 44; // height per profile row
  const PRH = profiles.length ? (20 + profiles.length * PH + 16) : 0; // total profile section height

  const CW=110,CH=44,HW=120,PAD=24,TH=72,AH=46,FH=30;
  const BCW=90; const W=PAD*2+HW+CW*n+BCW, H=PAD*2+TH+CH*(n+1)+AH+PRH+FH;
  const canvas=document.getElementById('matrix-canvas');
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#0d0d16'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#b8f050'; ctx.font='bold 18px Arial'; ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText('SplitEat — '+ev.name,PAD,PAD+4);
  ctx.fillStyle='#6868a0'; ctx.font='13px Arial';
  ctx.fillText('Matriz de pagos'+(ev.date?' · '+formatDate(ev.date):''),PAD,PAD+28);
  const SX=PAD,SY=PAD+TH;
  function dc(x,y,w,h,bg,txt,tc,bold,fs){
    ctx.fillStyle=bg; ctx.fillRect(x+1,y+1,w-2,h-2);
    ctx.fillStyle=tc||'#e8e8f0'; ctx.font=(bold?'bold ':'')+( fs||13)+'px Arial';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    let t=txt; while(ctx.measureText(t).width>w-12&&t.length>3) t=t.slice(0,-1);
    if(t!==txt) t=t.slice(0,-1)+'…'; ctx.fillText(t,x+w/2,y+h/2);
  }
  dc(SX,SY,HW,CH,'#13131a','Paga ↓ / Recibe →','#6868a0',true,11);
  friends.forEach((f,ci)=>dc(SX+HW+ci*CW,SY,CW,CH,'#1a1a2e',f.name,'#b8f050',true,12));
  dc(SX+HW+CW*n,SY,BCW,CH,'#1a1a2e','Balance','#50c8f0',true,12);
  friends.forEach((payer,ri)=>{
    const y=SY+CH*(ri+1); dc(SX,y,HW,CH,'#1a1a2e',payer.name,'#b8f050',true,12);
    friends.forEach((rec,ci)=>{
      const x=SX+HW+ci*CW;
      if(payer.id===rec.id){dc(x,y,CW,CH,'#111118','—','#3a3a52',false,13);return;}
      const t=transfers.find(t=>t.from===payer.name&&t.to===rec.name);
      t?dc(x,y,CW,CH,'#0f2010','$'+t.amount,'#50f0a0',true,13):dc(x,y,CW,CH,'#111118','$0','#3a3a52',false,12);
    });
    // Balance column
    const b=balance[payer.id];
    const bcol = b>0?'#0f2010':b<0?'#1a0808':'#111118';
    const btc  = b>0?'#50f0a0':b<0?'#f05050':'#3a3a52';
    const blbl = b>0?'+$'+b:b<0?'-$'+Math.abs(b):'$0';
    dc(SX+HW+CW*n,y,BCW,CH,bcol,blbl,btc,true,13);
  });

  // ── Alias row ──
  const AY=SY+CH*(n+1)+8;
  ctx.fillStyle='#2c2c3e'; ctx.fillRect(SX,AY,HW+CW*n+BCW,1);
  ctx.fillStyle='#6868a0'; ctx.font='bold 10px Arial'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText('ALIAS / CVU',SX+8,AY+20);
  friends.forEach((f,ci)=>{
    const x=SX+HW+ci*CW; ctx.fillStyle=f.alias?'#50c8f0':'#3a3a52';
    ctx.font=(f.alias?'bold ':' ')+'11px Arial'; ctx.textAlign='center';
    let a=f.alias||'—'; while(ctx.measureText(a).width>CW-10&&a.length>3) a=a.slice(0,-1);
    if(a!==(f.alias||'—')) a=a.slice(0,-1)+'…'; ctx.fillText(a,x+CW/2,AY+20);
  });

  // ── Profile breakdown section ──
  if(profiles.length) {
    const BY = AY + AH;
    ctx.fillStyle='#2c2c3e'; ctx.fillRect(SX, BY, HW+CW*n+BCW, 1);
    ctx.fillStyle='#6868a0'; ctx.font='bold 10px Arial'; ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText('LO QUE LE CORRESPONDE PAGAR POR PERFIL', SX+8, BY+14);
    profiles.forEach((p, i) => {
      const members = ev.friends.filter(p.filter);
      // All members in the same profile pay the same amount (same applicable expenses)
      // So just take the first member's owes as the representative per-person amount
      const perPerson = owes[members[0].id] || 0;
      const names = members.map(f=>f.name).join(', ');
      const rowY = BY + 20 + i * PH;
      const rowW = HW + CW * n + BCW;
      // row background alternate
      ctx.fillStyle = i%2===0 ? '#13131a' : '#0f0f18';
      ctx.fillRect(SX+1, rowY+1, rowW-2, PH-2);
      // emoji + label
      ctx.fillStyle = '#e8e8f0'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(p.emoji + ' ' + p.label, SX+10, rowY + PH/2 - 6);
      // names
      ctx.fillStyle = '#9090b8'; ctx.font = '11px Arial';
      let namesTxt = names;
      const maxW = rowW * 0.65;
      while(ctx.measureText(namesTxt).width > maxW && namesTxt.length > 3) namesTxt = namesTxt.slice(0,-1);
      if(namesTxt !== names) namesTxt = namesTxt.slice(0,-1) + '…';
      ctx.fillText(namesTxt, SX+10, rowY + PH/2 + 8);
      // total amount
      ctx.fillStyle = '#6868a0'; ctx.font = '10px Arial'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      ctx.fillText('le corresponde pagar', SX+rowW-10, rowY + PH/2 - 7);
      ctx.fillStyle = '#b8f050'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      ctx.fillText('$'+perPerson, SX+rowW-10, rowY + PH/2 + 8);
    });
  }

  // ── Footer legend ──
  const FY = AY + AH + PRH;
  ctx.fillStyle='#2c2c3e'; ctx.fillRect(SX, FY, HW+CW*n+BCW, 1);
  ctx.fillStyle='#6868a0'; ctx.font='11px Arial'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText('🟢 transferencia a realizar   |   — mismo usuario   |   $0 sin deuda', SX, FY+16);
  ctx.fillStyle='#b8f050'; ctx.font='bold 11px Arial'; ctx.textAlign='right';
  ctx.fillText('SplitEat', SX+HW+CW*n+BCW-4, FY+16);
  canvas.style.display='block';
  const dataUrl=canvas.toDataURL('image/png');
  canvas.style.display='none';
  document.getElementById('matrix-preview').innerHTML=
    '<div style="margin-top:4px"><img src="'+dataUrl+'" style="width:100%;border-radius:10px;border:1px solid var(--border)" alt="Matriz">'+
    '<a href="'+dataUrl+'" download="SplitEat_'+ev.name.replace(/\s+/g,'_')+'_matriz.png" style="display:block;margin-top:10px;text-align:center;padding:12px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);text-decoration:none;font-family:Syne,sans-serif;font-size:12px;font-weight:700">⬇️ Descargar imagen PNG</a></div>';
  showToast('✓ Imagen generada');
}

let toastTimer;
function showToast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}
